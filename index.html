<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Deadly Official Store</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0d0d0d;
color:white;
padding-bottom:50px;
}

header{
background:linear-gradient(135deg,#ff0033,#6600ff);
padding:25px;
text-align:center;
font-size:28px;
font-weight:700;
border-bottom-left-radius:25px;
border-bottom-right-radius:25px;
box-shadow:0 5px 20px rgba(0,0,0,0.4);
}

.logo{
width:90px;
height:90px;
border-radius:50%;
margin-bottom:10px;
border:3px solid white;
object-fit:cover;
}

.container{
padding:15px;
max-width:500px;
margin:auto;
}

.card{
background:#171717;
padding:18px;
border-radius:20px;
margin-top:18px;
box-shadow:0 4px 10px rgba(0,0,0,0.4);
}

.card h2{
font-size:20px;
margin-bottom:15px;
color:#ffcc00;
}

input,select{
width:100%;
padding:14px;
margin-top:10px;
background:#222;
border:none;
outline:none;
color:white;
border-radius:12px;
font-size:15px;
}

button{
width:100%;
padding:14px;
margin-top:15px;
border:none;
border-radius:12px;
background:linear-gradient(135deg,#ff0033,#9900ff);
color:white;
font-size:16px;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.03);
}

.result{
margin-top:15px;
padding:12px;
background:#111;
border-radius:12px;
font-size:15px;
line-height:1.6;
}

.pack{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px;
background:#222;
border-radius:12px;
margin-top:10px;
}

.pack button{
width:auto;
padding:10px 16px;
margin-top:0;
}

footer{
text-align:center;
padding:25px;
font-size:14px;
color:#999;
}
</style>
</head>
<body>

<header>
<img class="logo" src="https://i.imgur.com/4M34hi2.png">
<div>DEADLY OFFICIAL STORE</div>
</header>

<div class="container">

<div class="card">
<h2>MLBB Name Checker</h2>
<input type="text" id="userid" placeholder="Enter User ID">
<input type="text" id="zoneid" placeholder="Enter Zone ID">
<button onclick="checkName()">Check Name</button>
<div class="result" id="nameResult">Waiting...</div>
</div>

<div class="card">
<h2>Double Diamond Checker</h2>
<select id="diamondPack">
<option>86 Diamonds</option>
<option>172 Diamonds</option>
<option>257 Diamonds</option>
<option>344 Diamonds</option>
<option>514 Diamonds</option>
<option>706 Diamonds</option>
</select>
<button onclick="checkDouble()">Check Double Bonus</button>
<div class="result" id="doubleResult">Waiting...</div>
</div>

<div class="card">
<h2>MLBB Diamond Order</h2>

<div class="pack">
<div>
<h3>86 Diamonds</h3>
<p>₹79</p>
</div>
<button onclick="buyNow('86 Diamonds')">Buy</button>
</div>

<div class="pack">
<div>
<h3>172 Diamonds</h3>
<p>₹149</p>
</div>
<button onclick="buyNow('172 Diamonds')">Buy</button>
</div>

<div class="pack">
<div>
<h3>257 Diamonds</h3>
<p>₹219</p>
</div>
<button onclick="buyNow('257 Diamonds')">Buy</button>
</div>

<div class="pack">
<div>
<h3>Weekly Pass</h3>
<p>₹145</p>
</div>
<button onclick="buyNow('Weekly Pass')">Buy</button>
</div>

</div>

<div class="card">
<h2>Contact Store</h2>
<button onclick="window.open('https://wa.me/8787821704')">WhatsApp Order</button>
<button onclick="window.open('https://t.me/deadlyofficialstore')">Telegram</button>
</div>

</div>

<footer>
Deadly Official Store © 2026
</footer>

<script>

async function checkName(){

const user = document.getElementById('userid').value;
const zone = document.getElementById('zoneid').value;

if(!user || !zone){
document.getElementById('nameResult').innerHTML = 'Enter User ID and Zone ID';
return;
}

const resultDiv = document.getElementById('nameResult');
resultDiv.innerHTML = 'Checking...';

try{

// FREE PUBLIC MLBB API
const response = await fetch(`https://api.isan.eu.org/nickname/ml?id=${user}&zone=${zone}`);

const data = await response.json();

if(data.nickname){
resultDiv.innerHTML = `
<b>Nickname:</b> ${data.nickname}<br>
<b>User ID:</b> ${user}<br>
<b>Zone ID:</b> ${zone}<br>
<b>Status:</b> Valid Account ✅
`;
}else{
resultDiv.innerHTML = 'Player not found ❌';
}

}catch(err){
resultDiv.innerHTML = 'API Error or Server Offline ❌';
}
}

function checkDouble(){

const pack = document.getElementById('diamondPack').value;
const result = document.getElementById('doubleResult');

// Demo Logic
const random = Math.random();

if(random > 0.5){
result.innerHTML = `Double Diamond Available for ${pack} ✅`;
}else{
result.innerHTML = `Double Diamond Already Claimed ❌`;
}
}

function buyNow(item){

const user = document.getElementById('userid').value;
const zone = document.getElementById('zoneid').value;

const msg = `Hello Deadly Official Store,%0A%0AI want to buy ${item}%0A%0AUser ID: ${user}%0AZone ID: ${zone}`;

window.open(`https://wa.me/919999999999?text=${msg}`);
}

</script>

</body>
</html>
