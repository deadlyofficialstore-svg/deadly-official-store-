<script>

async function checkName(){

const user = document.getElementById('userid').value;
const zone = document.getElementById('zoneid').value;

const resultDiv = document.getElementById('nameResult');

if(!user || !zone){
resultDiv.innerHTML = 'Enter User ID and Zone ID';
return;
}

resultDiv.innerHTML = 'Checking Player...';

try{

const response = await fetch(`https://api.duniagames.co.id/api/transaction/v1/top-up/inquiry/store`, {
method: 'POST',
headers: {
'Content-Type': 'application/json'
},
body: JSON.stringify({
productId: "1",
itemId: "2",
catalogId: "57",
paymentId: "352",
gameId: user,
zoneId: zone,
product_ref: "REG"
})
});

const data = await response.json();

if(data?.data?.gameDetail?.userName){

resultDiv.innerHTML = `
<b>Nickname:</b> ${data.data.gameDetail.userName}<br>
<b>User ID:</b> ${user}<br>
<b>Zone ID:</b> ${zone}<br>
<b>Status:</b> Valid Account ✅
`;

}else{
resultDiv.innerHTML = 'Invalid ID or Zone ❌';
}

}catch(error){

resultDiv.innerHTML = 'API Server Busy ❌';

}

}

</script>
